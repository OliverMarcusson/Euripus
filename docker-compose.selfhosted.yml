services:
  postgres:
    image: docker.io/library/postgres:17
    restart: unless-stopped
    env_file:
      - apps/server/.env
    volumes:
      - euripus-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  meilisearch:
    image: docker.io/getmeili/meilisearch:v1.15
    restart: unless-stopped
    env_file:
      - apps/server/.env
    volumes:
      - euripus-meilisearch-data:/meili_data

  server:
    image: ${EURIPUS_SERVER_IMAGE:-ghcr.io/olivermarcusson/euripus-server}:${EURIPUS_IMAGE_TAG:-selfhosted-latest}
    restart: unless-stopped
    env_file:
      - apps/server/.env
    environment:
      APP_MEILISEARCH_URL: http://meilisearch:7700
    depends_on:
      meilisearch:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      start_period: 180s
      retries: 12
    expose:
      - "8080"

  web:
    image: ${EURIPUS_WEB_IMAGE:-ghcr.io/olivermarcusson/euripus-web}:${EURIPUS_IMAGE_TAG:-selfhosted-latest}
    restart: unless-stopped
    environment:
      EURIPUS_API_UPSTREAM: server
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${EURIPUS_WEB_PORT:-8088}:80"

volumes:
  euripus-postgres-data:
  euripus-meilisearch-data:
