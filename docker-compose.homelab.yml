services:
  postgres:
    image: docker.io/library/postgres:17
    restart: unless-stopped
    env_file:
      - apps/server/.env
    volumes:
      - homelab-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    image: ${EURIPUS_SERVER_IMAGE:-ghcr.io/olivermarcusson/euripus-server}:${EURIPUS_IMAGE_TAG:-homelab-latest}
    restart: unless-stopped
    env_file:
      - apps/server/.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  web:
    image: ${EURIPUS_WEB_IMAGE:-ghcr.io/olivermarcusson/euripus-web}:${EURIPUS_IMAGE_TAG:-homelab-latest}
    restart: unless-stopped
    environment:
      EURIPUS_API_UPSTREAM: server
    depends_on:
      server:
        condition: service_started
    ports:
      - "${EURIPUS_WEB_PORT:-8088}:80"

volumes:
  homelab-postgres-data:
