services:
  postgres:
    ports:
      - "${EURIPUS_POSTGRES_HOST_PORT:-15432}:5432"

  gluetun:
    image: docker.io/qmcgaw/gluetun:v3.41.1
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - apps/server/.env.nordvpn
    environment:
      VPN_SERVICE_PROVIDER: nordvpn
      FIREWALL_INPUT_PORTS: 8080
      FIREWALL_OUTBOUND_SUBNETS: 10.89.0.1/32

  server:
    network_mode: "service:gluetun"
    env_file:
      - apps/server/.env
      - apps/server/.env.nordvpn.server
    depends_on:
      postgres:
        condition: service_healthy
      gluetun:
        condition: service_started

  web:
    environment:
      EURIPUS_API_UPSTREAM: gluetun
    depends_on:
      gluetun:
        condition: service_started
      server:
        condition: service_started
