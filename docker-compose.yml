services:
  postgres:
    image: postgres:17
    env_file:
      - apps/server/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U euripus -d euripus"]
      interval: 5s
      timeout: 5s
      retries: 20

  meilisearch:
    image: getmeili/meilisearch:v1.15
    env_file:
      - apps/server/.env
    environment:
      MEILI_ENV: development
    volumes:
      - meilisearch-data:/meili_data

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - apps/server/.env
    depends_on:
      meilisearch:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  meilisearch-data:
