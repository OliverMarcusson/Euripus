services:
  postgres:
    image: postgres:17
    env_file:
      - apps/server/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U euripus -d euripus"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    gpus: all
    env_file:
      - apps/server/.env
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${EURIPUS_PI_AGENT_DIR:-./.runtime/pi-agent}:/root/.pi/agent
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      start_period: 180s
      retries: 12
    ports:
      - "8080:8080"

volumes:
  postgres-data:
