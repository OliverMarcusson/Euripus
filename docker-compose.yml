services:
  postgres:
    image: postgres:17
    env_file:
      - apps/server/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U euripus -d euripus"]
      interval: 5s
      timeout: 5s
      retries: 20

  meilisearch:
    image: getmeili/meilisearch:v1.15
    env_file:
      - apps/server/.env
    environment:
      MEILI_ENV: development
    volumes:
      - meilisearch-data:/meili_data

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - apps/server/.env
    environment:
      APP_MEILISEARCH_URL: http://meilisearch:7700
      APP_PUBLIC_ORIGIN: ${APP_PUBLIC_ORIGIN-}
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS-http://127.0.0.1:5173,http://localhost:5173}
      APP_SPORTS_API_BASE_URL: http://host.docker.internal:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      meilisearch:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      start_period: 180s
      retries: 12
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  meilisearch-data:
