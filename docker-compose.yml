services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: euripus
      POSTGRES_USER: euripus
      POSTGRES_PASSWORD: euripus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U euripus -d euripus"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - apps/server/.env
    environment:
      APP_DATABASE_URL: postgres://euripus:euripus@postgres:5432/euripus
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres-data:
