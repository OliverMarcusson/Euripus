<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Euripus Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #140b2b;
        color: #f7f1ff;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      main {
        max-width: 32rem;
        padding: 2rem;
        text-align: center;
      }

      h1 {
        margin-bottom: 0.75rem;
      }

      p {
        line-height: 1.6;
        color: rgba(247, 241, 255, 0.8);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Euripus is offline</h1>
      <p>The app shell is still installed, but you need a network connection to refresh guide data, search, and start playback.</p>
    </main>
  </body>
</html>
